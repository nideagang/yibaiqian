<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

            .error-page h1 {
                font-size: 80px;
                color: #40916c;
                margin: 0;
            }

            .error-page p {
                font-size: 18px;
                color: #666;
                margin: 12px 0 30px;
            }

        .back-home {
            padding: 12px 32px;
            background-color: #40916c;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }

            .back-home:hover {
                opacity: 0.9;
            }
    </style>
</head>
<body>
    <header class="header">
        <div class="container nav-wrap">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;">TRADE GLOBAL | 外贸进出口</div>
            <nav class="nav">
                <a href="index.html">首页 Home</a>
                <a href="about.html">关于我们 About</a>
                <a href="products.html">产品 Products</a>
                <a href="contact.html">联系我们 Contact</a>
                <button class="quote-btn" onclick="window.location.href='contact.html'">Get Quote 立即询盘</button>
            </nav>
        </div>
    </header>

    <div class="error-page">
        <h1>404</h1>
        <p>抱歉，您访问的页面不存在 / Sorry, the page you visited does not exist</p>
        <a href="index.html" class="back-home">返回首页 Back to Home</a>
    </div>

    <footer class="footer" style="position: fixed; bottom: 0; width: 100%;">
        <div class="container">
            <p>© 2026 Trade Global Import & Export Co., Ltd. All Rights Reserved</p>
        </div>
    </footer>
</body>
</html>
